name = "bussey-bussey-api"
main = "src/index.ts"
compatibility_date = "2026-05-18"
compatibility_flags = ["nodejs_compat"]

# ─── Environments ────────────────────────────────────────────────────
#
# Top-level config (this section) is the **dev** environment. It uses
# the resource names + IDs that local `wrangler dev` mounts against
# the .wrangler/state/ directory — no real Cloudflare account needed.
#
# `wrangler deploy` (no --env) deploys this top-level config. For
# production we publish under `--env production` which overrides the
# bindings with the prod-tier resource IDs below. Staging gets its
# own slice for end-to-end verification before prod.
#
# After running the resource-creation commands in
# `context/deployment-runbook.md` you'll paste the returned IDs into
# the `[env.staging]` and `[env.production]` blocks at the bottom of
# this file.
#
# ─── DEV (default) bindings ─────────────────────────────────────────

# Observability — Worker tail logs visible in the Cloudflare dashboard.
[observability]
enabled = true

# D1: relational store for all entities defined in specs/02-data-model.md.
# `database_id` is a placeholder. After running `wrangler d1 create bussey-bussey`,
# replace this value with the ID Cloudflare returns.
[[d1_databases]]
binding = "DB"
database_name = "bussey-bussey"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "../migrations"

# R2: file storage for generated PDFs (contracts, change orders, invoices, etc.)
# Create the bucket with `wrangler r2 bucket create bussey-bussey-files` before first deploy.
[[r2_buckets]]
binding = "FILES"
bucket_name = "bussey-bussey-files"

# KV: session cache (admin + portal session token mirror, chat sessions, ephemeral tokens).
# `id` is a placeholder. After running `wrangler kv namespace create SESSIONS`,
# replace this value with the namespace ID Cloudflare returns.
[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Local-only KV namespace ID for `wrangler dev` (Wrangler will auto-generate one in .wrangler/).
# preview_id is optional; leave commented unless you provision a preview namespace explicitly.
# preview_id = "REPLACE_WITH_KV_PREVIEW_ID"

# Bundler rules: import *.md files as text strings. Lets the activation
# service `import templateBody from '../../../templates/contract/master.md'`
# without a separate generator step, preserving the drop-in property of the
# template file (see templates/contract/README.md).
[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

# Secrets are loaded from .dev.vars during `wrangler dev`. See .dev.vars.example.
# In production: set with `wrangler secret put <NAME> --env production`.

# ─── STAGING ────────────────────────────────────────────────────────
#
# Deploy with `wrangler deploy --env staging` after pasting the
# Cloudflare-returned IDs in below. Secrets are set per-environment
# via `wrangler secret put <NAME> --env staging`.

[env.staging]
name = "bussey-bussey-api-staging"

# Observability inherits from top-level config but each [env.*] block
# re-declares its bindings. Override per resource type below.

# Non-secret config readable by the worker as `env.<NAME>`. Anything
# sensitive (ANTHROPIC_API_KEY, STRIPE_SECRET_KEY, RESEND_API_KEY,
# SESSION_SECRET, STRIPE_WEBHOOK_SECRET) is installed separately via
# `wrangler secret put <NAME> --env staging` and does NOT live here.
# See context/env-vars.md for the full inventory.
[env.staging.vars]
ENV = "staging"
# M.4 topology = PATH-BASED, single origin. All surfaces live under one
# hostname; the worker is mounted on /api/* and /p/* via routes (below).
# Staging mirrors prod on a dedicated subdomain (staging.busseyandbussey.com)
# rather than *.pages.dev — a real zone hostname is required for the worker
# routes that keep the SPAs' relative /api calls same-origin (workers.dev
# and pages.dev are different hosts, which would break that). The admin /
# portal SvelteKit apps build with base paths /admin and /portal, so these
# URL bases include the path segment (matches the dev values, which carry
# /admin and /portal too). See context/deployment-runbook.md §4.
ADMIN_URL_BASE = "https://staging.busseyandbussey.com/admin"
PORTAL_URL_BASE = "https://staging.busseyandbussey.com/portal"
# Demo iframe (${DEMO_URL_BASE}/demos/:token/) is served same-origin by the
# site build; an explicit absolute same-origin value avoids any falsy-empty
# edge case in the renderer.
DEMO_URL_BASE = "https://staging.busseyandbussey.com"
# ADMIN_NOTIFY_EMAILS is installed as a SECRET right now (not a public
# var) because the value is a personal email — admin hasn't set up
# business email at busseyandbussey.com yet. The placeholder below is a
# breadcrumb; the real value is set via
#   wrangler secret put ADMIN_NOTIFY_EMAILS --env staging
# Secret values shadow [vars] entries at runtime, so this placeholder
# never reaches the worker. Move back to a real [vars] entry once
# business email exists — see notes/deferred-cleanup.md.
ADMIN_NOTIFY_EMAILS = "REPLACE_WITH_ADMIN_EMAIL"
# TODO(M.3): paste the real Stripe TEST publishable key (pk_test_…) from
# Stripe dashboard → Developers → API keys.
STRIPE_PUBLISHABLE_KEY = "pk_test_REPLACE_WITH_STAGING_PUBLISHABLE_KEY"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "bussey-bussey-staging"
database_id = "f6c991cc-5e8e-4f4c-ab24-79c1623e66dc"
migrations_dir = "../migrations"

[[env.staging.r2_buckets]]
binding = "FILES"
bucket_name = "bussey-bussey-files-staging"

[[env.staging.kv_namespaces]]
binding = "SESSIONS"
id = "31ae2b5ecd594387b7329ffa464c9a52"

[[env.staging.rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

[env.staging.observability]
enabled = true

# Worker routes (M.4 — PATH-BASED topology). These mount the worker on
# the API surface and the public presentation surface of the staging
# hostname, in front of the Pages-served front end (worker routes take
# precedence over a Pages custom domain on the same host, most-specific
# pattern wins). The /api/* route covers chat, admin, portal, and Stripe
# webhook traffic; /p/* covers client presentation links.
#
# ACTIVATED — the busseyandbussey.com zone is live on Cloudflare (M.4
# human step done 2026-05-23). `wrangler deploy --env staging` now binds
# these routes. NOTE: the routes resolve against the zone, but staging
# traffic only *serves* once staging.busseyandbussey.com exists as a
# hostname — i.e. the staging Pages custom domain is attached (M.6) OR a
# proxied DNS record for `staging` exists. See runbook §5 sequencing.
[[env.staging.routes]]
pattern = "staging.busseyandbussey.com/api/*"
zone_name = "busseyandbussey.com"

[[env.staging.routes]]
pattern = "staging.busseyandbussey.com/p/*"
zone_name = "busseyandbussey.com"

# ─── PRODUCTION ─────────────────────────────────────────────────────
#
# Deploy with `wrangler deploy --env production`. The Worker is
# published as bussey-bussey-api-production (or renamed via a Cloudflare
# route on the API hostname). Real money flows here — verify the
# production smoke test passes before announcing to any real client.

[env.production]
name = "bussey-bussey-api-production"

# Non-secret config readable by the worker as `env.<NAME>`. Same rule as
# staging: secrets are installed via `wrangler secret put <NAME> --env
# production` and do NOT live here. See context/env-vars.md.
#
# Production STRIPE_PUBLISHABLE_KEY stays as a placeholder until the
# user activates a real Stripe account with live keys. Production
# deployment is intentionally blocked until that key + the matching
# STRIPE_SECRET_KEY secret are installed; see deployment-runbook.md
# section 3 "Deferred production credentials."
[env.production.vars]
ENV = "production"
# M.4 topology = PATH-BASED, single origin (see staging note above and
# context/deployment-runbook.md §4). Admin/portal serve under /admin and
# /portal on the apex; these URL bases carry the path segment so email
# links resolve into the SPAs (e.g. ${ADMIN_URL_BASE}/leads/:id ->
# https://busseyandbussey.com/admin/leads/:id).
ADMIN_URL_BASE = "https://busseyandbussey.com/admin"
PORTAL_URL_BASE = "https://busseyandbussey.com/portal"
# Demo iframe served same-origin by the site build (absolute same-origin
# value; see staging note).
DEMO_URL_BASE = "https://busseyandbussey.com"
# Installed as SECRET (same reason as staging — see notes/deferred-cleanup.md).
# Real value set via:
#   wrangler secret put ADMIN_NOTIFY_EMAILS --env production
ADMIN_NOTIFY_EMAILS = "REPLACE_WITH_ADMIN_EMAIL"
# DEFERRED(M.3.4): production Stripe publishable key (pk_live_…) lands
# when the Stripe business activation is complete.
STRIPE_PUBLISHABLE_KEY = "pk_live_REPLACE_WHEN_STRIPE_LIVE_MODE_ACTIVATES"

[[env.production.d1_databases]]
binding = "DB"
database_name = "bussey-bussey-production"
database_id = "aac8980f-4e93-4bef-a778-dbb3d02d474b"
migrations_dir = "../migrations"

[[env.production.r2_buckets]]
binding = "FILES"
bucket_name = "bussey-bussey-files-production"

[[env.production.kv_namespaces]]
binding = "SESSIONS"
id = "5a4ecb652e9842df8c4390e684c9c4d9"

[[env.production.rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

[env.production.observability]
enabled = true

# Worker routes (M.4 — PATH-BASED topology). Same rationale as the staging
# routes above: the worker owns /api/* (chat + admin + portal + Stripe
# webhooks) and /p/* (presentation links) on the apex, in front of the
# Pages-served site/admin/portal.
#
# ACTIVATED — the busseyandbussey.com zone is live (2026-05-23), so these
# bind on `wrangler deploy --env production`. NOTE: the *production deploy
# itself* is still GATED until the production secrets + the real pk_live_
# STRIPE_PUBLISHABLE_KEY are installed (runbook §3) and the M.6 deploy plan
# is approved. These route definitions being active does not deploy
# anything on their own — they only take effect on the next prod deploy.
[[env.production.routes]]
pattern = "busseyandbussey.com/api/*"
zone_name = "busseyandbussey.com"

[[env.production.routes]]
pattern = "busseyandbussey.com/p/*"
zone_name = "busseyandbussey.com"
